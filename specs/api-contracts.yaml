# Aurellia API Contracts
# Formal API specifications for all endpoints.

version: "1.0"
base_url: "/api/v1"
content_type: "application/json"

# ─── Shared Schemas ─────────────────────────────────────────────────────────

schemas:

  RepoDTO:
    type: object
    required: [title, url, source]
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 500
        example: "langchain-ai/langchain"
      description:
        type: string
        maxLength: 5000
        example: "Build context-aware reasoning applications"
      url:
        type: string
        format: uri
        pattern: "^https://"
        example: "https://github.com/langchain-ai/langchain"
      source:
        type: string
        enum: [github]
      repo_category:
        type: string
        enum: [llm, ai_agent, framework, tool, data, webdev, security, devtools, game, other]
      language:
        type: string
        example: "Python"
      stars:
        type: integer
        minimum: 0
        example: 95000
      forks:
        type: integer
        minimum: 0
        example: 15000
      stars_today:
        type: integer
        minimum: 0
        example: 250
      tags:
        type: array
        items:
          type: string
        example: ["llm", "langchain", "ai", "python"]
      skill_level:
        type: string
        enum: [beginner, intermediate, advanced, any]
      relevance_score:
        type: number
        minimum: 0
        maximum: 1

  UserPreferenceDTO:
    type: object
    properties:
      interests:
        type: array
        items:
          type: string
        example: ["ai", "llm", "agents"]
      languages:
        type: array
        items:
          type: string
        example: ["python", "typescript", "rust"]
      skill_level:
        type: string
        enum: [beginner, intermediate, advanced, any]

  DigestEntryDTO:
    type: object
    required: [rank, title, url, relevance_score]
    properties:
      rank:
        type: integer
        minimum: 1
      title:
        type: string
      url:
        type: string
        format: uri
      stars:
        type: integer
      stars_today:
        type: integer
      language:
        type: string
      relevance_score:
        type: number
        minimum: 0
        maximum: 1
      reason:
        type: string

  DigestDTO:
    type: object
    required: [entries, period, generated_at]
    properties:
      entries:
        type: array
        items:
          $ref: "#/components/schemas/DigestEntryDTO"
      period:
        type: string
        enum: [today, week, month]
      generated_at:
        type: string
        format: date-time

  ErrorResponse:
    type: object
    required: [detail]
    properties:
      detail:
        type: string
        example: "Invalid language name"

# ─── Endpoints ──────────────────────────────────────────────────────────────

endpoints:

  # ── Health Check ──────────────────────────────────────────────────────────
  GET /health:
    description: "Service health check"
    auth: false
    responses:
      "200":
        description: Service is healthy
        body:
          type: object
          properties:
            status:
              type: string
              example: "healthy"
            version:
              type: string
              example: "0.3.0"

  # ── List Repos ───────────────────────────────────────────────────────────
  GET /repos:
    description: "List trending repos with optional filters"
    auth: false
    query_params:
      - name: language
        type: string
        required: false
        description: Filter by programming language
        example: "python"
      - name: topic
        type: string
        required: false
        description: Filter by topic tag
        example: "ai"
      - name: min_stars
        type: integer
        required: false
        default: 0
        min: 0
        description: Minimum star count
    responses:
      "200":
        description: List of repos
        body:
          type: array
          items:
            $ref: "#/components/schemas/RepoDTO"
      "422":
        description: Validation error
        body:
          $ref: "#/components/schemas/ErrorResponse"

  # ── Get Repo ─────────────────────────────────────────────────────────────
  GET /repos/{repo_id}:
    description: "Get a single repo by ID"
    auth: false
    path_params:
      - name: repo_id
        type: integer
        required: true
    responses:
      "200":
        description: Repo details
        body:
          $ref: "#/components/schemas/RepoDTO"
      "404":
        description: Repo not found
      "501":
        description: Not implemented in v3

  # ── Get Digest ────────────────────────────────────────────────────────────
  GET /digest:
    description: "Get a personalized repo digest"
    auth: true
    query_params:
      - name: user_id
        type: string
        required: true
        description: User identifier
      - name: period
        type: string
        required: false
        default: "week"
        enum: [today, week, month]
    responses:
      "200":
        description: Personalized digest
        body:
          $ref: "#/components/schemas/DigestDTO"
      "401":
        description: Authentication required
      "422":
        description: Missing or invalid parameters

  # ── Update Preferences ────────────────────────────────────────────────────
  POST /preferences:
    description: "Update user preferences"
    auth: true
    body:
      $ref: "#/components/schemas/UserPreferenceDTO"
    responses:
      "200":
        description: Preferences updated
        body:
          type: object
          properties:
            status:
              type: string
              example: "ok"
            user_id:
              type: string
      "422":
        description: Validation error (invalid language, skill level, etc.)

  # ── Get Preferences ───────────────────────────────────────────────────────
  GET /preferences:
    description: "Get user preferences"
    auth: true
    query_params:
      - name: user_id
        type: string
        required: true
    responses:
      "200":
        description: User preferences
        body:
          $ref: "#/components/schemas/UserPreferenceDTO"

  # ── MCP Tools ─────────────────────────────────────────────────────────────
  mcp/list_repos:
    description: "MCP tool: List trending GitHub repos"
    parameters:
      language:
        type: string
        nullable: true
      topic:
        type: string
        nullable: true
      min_stars:
        type: integer
        default: 0
    returns:
      type: array
      items:
        $ref: "#/components/schemas/RepoDTO"

  mcp/get_digest:
    description: "MCP tool: Get personalized morning digest"
    auth: true
    parameters:
      user_id:
        type: string
        required: true
      period:
        type: string
        default: "week"
        enum: [today, week, month]
    returns:
      $ref: "#/components/schemas/DigestDTO"

  mcp/search_repos:
    description: "MCP tool: Natural language repo search"
    parameters:
      query:
        type: string
        required: true
        example: "python LLM agent framework"
    returns:
      type: array
      items:
        $ref: "#/components/schemas/RepoDTO"
